{% extends "admin/change_list.html" %}
{% load i18n admin_urls static admin_list %}

{% block content %}
    <div class="flex flex-col gap-8">
        <!-- Your custom stats section -->
        <div class="bg-white dark:bg-gray-800 rounded shadow-sm p-6">
            <h2 class="text-lg font-semibold mb-4">Assignment Statistics</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="stat-card">
                    <div class="text-sm text-gray-600 dark:text-gray-400">Total Assignments</div>
                    <div class="text-2xl font-bold">{{ cl.result_count }}</div>
                </div>
                <!-- Add more stats as needed -->
            </div>
        </div>
        
        <!-- Regular change list from Unfold -->
        {{ block.super }}
    </div>
{% endblock %}
